services:
  surf:
    build: .
    depends_on:
      - mongodb
    environment:
      - MONGOLAB_URI=mongodb://mongodb:27017/wave0
      - HOSTNAME=http://localhost:8000
      - TESTMODE=1
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: npm run start
    networks:
      - backend

  mongodb:
    image: mongo:8.0
    volumes:
      - mongodb:/mdata/db/
    networks:
      - backend

networks:
  backend:

volumes:
  mongodb:
